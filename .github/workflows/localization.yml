name: Localization Sync

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "crowdin.yml"
      - ".github/workflows/localization.yml"
      - "src/main/resources/assets/kruemblegard/lang/en_us.json"
      - "tools/sync_lang_locales.py"
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: localization-sync
  cancel-in-progress: false

jobs:
  upload-sources:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Crowdin credentials
        id: crowdin_credentials
        env:
          CROWDIN_PROJECT_ID: ${{ secrets['CROWDIN_PROJECT_ID'] }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets['CROWDIN_PERSONAL_TOKEN'] }}
        run: |
          if [ -n "$CROWDIN_PROJECT_ID" ] && [ -n "$CROWDIN_PERSONAL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Crowdin secrets are not configured; skipping source upload."
          fi

      - name: Upload source strings to Crowdin
        if: steps.crowdin_credentials.outputs.configured == 'true'
        uses: crowdin/github-action@v2.16.0
        with:
          config: crowdin.yml
          upload_sources: true
          upload_translations: false
          download_translations: false
          crowdin_branch_name: main
        env:
          CROWDIN_PROJECT_ID: ${{ secrets['CROWDIN_PROJECT_ID'] }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets['CROWDIN_PERSONAL_TOKEN'] }}

  download-reviewed-translations:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Crowdin credentials
        id: crowdin_credentials
        env:
          CROWDIN_PROJECT_ID: ${{ secrets['CROWDIN_PROJECT_ID'] }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets['CROWDIN_PERSONAL_TOKEN'] }}
        run: |
          if [ -n "$CROWDIN_PROJECT_ID" ] && [ -n "$CROWDIN_PERSONAL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Crowdin secrets are not configured; skipping translation download."
          fi

      - name: Download approved translations from Crowdin
        if: steps.crowdin_credentials.outputs.configured == 'true'
        uses: crowdin/github-action@v2.16.0
        with:
          config: crowdin.yml
          upload_sources: false
          upload_translations: false
          download_translations: true
          export_only_approved: true
          skip_untranslated_strings: true
          skip_untranslated_files: true
          push_translations: false
          create_pull_request: false
          crowdin_branch_name: main
        env:
          CROWDIN_PROJECT_ID: ${{ secrets['CROWDIN_PROJECT_ID'] }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets['CROWDIN_PERSONAL_TOKEN'] }}

      - name: Normalize locale filenames and sync fallback keys
        if: steps.crowdin_credentials.outputs.configured == 'true'
        run: |
          python3 tools/sync_lang_locales.py
          python3 tools/sync_lang_locales.py --verify

      - name: Detect locale changes
        if: steps.crowdin_credentials.outputs.configured == 'true'
        id: locale_changes
        run: |
          if git diff --quiet -- src/main/resources/assets/kruemblegard/lang; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit reviewed translations branch
        if: steps.locale_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="crowdin/reviewed-localizations"

          git checkout -B "$branch"
          git add src/main/resources/assets/kruemblegard/lang
          git commit -m "chore(localization): import reviewed Crowdin translations"
          git push --force origin "$branch"

          if [ "$(gh pr list --head "$branch" --base main --json number --jq 'length')" -eq 0 ]; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "Import reviewed Crowdin translations" \
              --body "This PR imports approved locale updates from Crowdin and re-syncs untranslated keys through tools/sync_lang_locales.py."
          fi