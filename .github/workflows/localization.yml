name: Localization Verify

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify locale sync and coverage
        shell: pwsh
        run: ./tools/sync_lang_files.ps1 -Verify
