name: Build (Forge 1.20.1)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Verify mirrored locale files
        run: python3 tools/sync_lang_locales.py --verify

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kruemblegard-jars
          path: build/libs/*.jar
          if-no-files-found: error
